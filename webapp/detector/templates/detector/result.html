<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Detection Result</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; }
        img { max-width: 80%; height: auto; border: 2px solid #333; margin-top: 20px; }
        .btn { display: inline-block; margin-top: 20px; padding: 10px 20px; background-color: #007BFF; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>Detection Complete</h1>
    
    {% if result_image %}
        <img src="{{ result_image }}" alt="Processed Image with Bounding Boxes">
    {% else %}
        <p>Something went wrong. No image was returned.</p>
    {% endif %}

    <br>
    <a href="/" class="btn">Upload Another Image</a>

</body>
