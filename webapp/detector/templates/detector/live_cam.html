<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Drone Detection</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; }
        .stream-container { margin: 0 auto; border: 4px solid #333; display: inline-block; }
        /* Forces the stream to fit nicely on the screen */
        img { max-width: 800px; width: 100%; height: auto; display: block; }
        .btn { display: inline-block; margin-top: 20px; padding: 10px 20px; background-color: #007BFF; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>Live Camera Feed</h1>
    <p>Real-time YOLOv8 Inference</p>
    
    <div class="stream-container">
        <img src="{% url 'video_feed' %}" alt="Live Camera Stream">
    </div>

    <br>
    <a href="/" class="btn">Back to Home</a>

</body>
</html>
